name: Deploy to Server

on:
  push:
    branches:
      - main
    # Запускать деплой при любом коммите в main (включая merge commits, прямые коммиты и т.д.)
  pull_request:
    types:
      - closed
    branches:
      - main
    # Запускать деплой при слиянии pull request в main
  workflow_dispatch:
    # Позволяет запускать деплой вручную через интерфейс GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e  # Останавливать выполнение при любой ошибке

            # Явная загрузка nvm и добавление Node.js в PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Явное добавление пути к Node.js в PATH (на случай если nvm не загрузился)
            export PATH="$HOME/.nvm/versions/node/v24.9.0/bin:$PATH"

            # Проверка доступности npm
            if ! command -v npm &> /dev/null; then
              echo "❌ npm не найден даже после загрузки nvm и добавления в PATH"
              echo "PATH: $PATH"
              exit 1
            fi

            echo "✓ Node.js версия: $(node -v)"
            echo "✓ npm версия: $(npm -v)"

            PROJECT_DIR="/home/multistream"
            SCREEN_NAME="multistream"
            PORT="${PORT:-3000}"

            echo "=== Начало деплоя ==="

            # Проверка существования директории
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "❌ Ошибка: директория $PROJECT_DIR не существует"
              exit 1
            fi

            cd "$PROJECT_DIR"

            # Сохранение текущего коммита для возможного отката
            CURRENT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "Текущий коммит: $CURRENT_COMMIT"

            # Создание бэкапа (если существует .next)
            if [ -d ".next" ]; then
              echo "📦 Создание резервной копии сборки..."
              rm -rf .next.backup 2>/dev/null || true
              cp -r .next .next.backup
            fi

            # Graceful shutdown с таймаутом
            if screen -list | grep -q "$SCREEN_NAME"; then
              echo "🛑 Остановка текущего процесса..."
              screen -S "$SCREEN_NAME" -X stuff "^C"
              
              # Ждем graceful shutdown (максимум 10 секунд)
              for i in {1..10}; do
                if ! screen -list | grep -q "$SCREEN_NAME"; then
                  echo "✓ Процесс остановлен корректно"
                  break
                fi
                sleep 1
              done
              
              # Принудительное завершение если не остановился
              screen -S "$SCREEN_NAME" -X quit 2>/dev/null || true
              sleep 2
            fi

            # Функция отката
            rollback() {
              echo "🔄 Откат к предыдущей версии..."
              
              if [ "$CURRENT_COMMIT" != "none" ]; then
                git reset --hard "$CURRENT_COMMIT" 2>/dev/null || true
              fi
              
              if [ -d ".next.backup" ]; then
                rm -rf .next
                mv .next.backup .next
              fi
              
              if [ -d "node_modules.backup" ]; then
                rm -rf node_modules
                mv node_modules.backup node_modules
              fi
              
              # Запуск предыдущей версии
              screen -dmS "$SCREEN_NAME" bash -c "
                export NVM_DIR=\"\$HOME/.nvm\"
                [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
                export PATH=\"\$HOME/.nvm/versions/node/v24.9.0/bin:\$PATH\"
                cd $PROJECT_DIR && NODE_ENV=production npm run start 2>&1 | tee -a logs/app.log
              " || true
              sleep 3
              
              echo "❌ Деплой провален. Восстановлена предыдущая версия."
              exit 1
            }

            # Trap для автоматического отката при ошибке
            trap rollback ERR

            # Получение обновлений
            echo "📥 Получение обновлений из репозитория..."
            git fetch origin || { echo "❌ Ошибка git fetch"; exit 1; }
            git checkout main || { echo "❌ Ошибка git checkout"; exit 1; }
            git pull origin main || { echo "❌ Ошибка git pull"; exit 1; }

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "Новый коммит: $NEW_COMMIT"

            if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ] && [ "$CURRENT_COMMIT" != "none" ]; then
              echo "ℹ️  Нет новых изменений для деплоя"
            fi

            # Управление зависимостями
            if [ -d "node_modules" ]; then
              echo "💾 Сохранение node_modules..."
              mv node_modules node_modules.backup || true
            fi

            # Проверка необходимости переустановки зависимостей
            NEED_INSTALL=false
            if [ ! -d "node_modules.backup" ]; then
              NEED_INSTALL=true
            elif [ ! -f "node_modules.backup/.package-lock.json" ]; then
              NEED_INSTALL=true
            elif ! cmp -s "package-lock.json" "node_modules.backup/.package-lock.json" 2>/dev/null; then
              NEED_INSTALL=true
            fi

            if [ "$NEED_INSTALL" = true ]; then
              echo "📦 Установка зависимостей..."
              rm -rf node_modules.backup
              npm ci --production=false || { echo "❌ Ошибка npm ci"; exit 1; }
              cp package-lock.json node_modules/.package-lock.json
            else
              echo "♻️  Использование кэшированных зависимостей..."
              rm -rf node_modules
              mv node_modules.backup node_modules
            fi

            # Очистка старой сборки
            rm -rf .next

            # Сборка приложения
            echo "🔨 Сборка приложения..."
            NODE_ENV=production npm run build || { echo "❌ Ошибка сборки"; exit 1; }

            # Создание директории для логов если не существует
            mkdir -p logs

            # Запуск приложения
            echo "🚀 Запуск приложения..."
            screen -dmS "$SCREEN_NAME" bash -c "
              export NVM_DIR=\"\$HOME/.nvm\"
              [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
              export PATH=\"\$HOME/.nvm/versions/node/v24.9.0/bin:\$PATH\"
              cd $PROJECT_DIR && NODE_ENV=production npm run start 2>&1 | tee -a logs/app.log
            "

            # Health check с улучшенной проверкой
            echo "🔍 Проверка работоспособности приложения..."
            MAX_RETRIES=20
            RETRY_COUNT=0
            APP_STARTED=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              sleep 3
              
              # Проверка 1: Screen сессия должна быть запущена
              if ! screen -list | grep -q "$SCREEN_NAME"; then
                echo "❌ Screen сессия не запущена"
                exit 1
              fi
              
              # Проверка 2: Процесс Node.js должен быть запущен
              if pgrep -f "node.*npm run start" > /dev/null || pgrep -f "node.*next start" > /dev/null; then
                echo "✓ Процесс Node.js найден"
                
                # Проверка 3: Порт должен слушаться (если netstat доступен)
                if command -v netstat &> /dev/null; then
                  if netstat -tuln | grep -q ":$PORT "; then
                    echo "✓ Порт $PORT слушается"
                    APP_STARTED=true
                    break
                  fi
                elif command -v ss &> /dev/null; then
                  if ss -tuln | grep -q ":$PORT "; then
                    echo "✓ Порт $PORT слушается"
                    APP_STARTED=true
                    break
                  fi
                fi
                
                # Проверка 4: HTTP endpoint (опционально)
                if command -v curl &> /dev/null; then
                  if curl -sf -m 5 "http://localhost:$PORT" > /dev/null 2>&1; then
                    echo "✓ HTTP endpoint отвечает"
                    APP_STARTED=true
                    break
                  fi
                fi
                
                # Если процесс запущен, но порт еще не слушается, продолжаем ждать
                if [ $RETRY_COUNT -ge 5 ]; then
                  echo "⏳ Процесс запущен, ожидаем готовности приложения..."
                fi
              fi
              
              # Проверка 5: Проверяем логи на наличие сообщений об ошибках
              if [ -f "logs/app.log" ]; then
                if grep -iq "error\|fatal\|exception" logs/app.log | tail -5; then
                  echo "⚠️  Обнаружены ошибки в логах"
                fi
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              
              if [ $((RETRY_COUNT % 3)) -eq 0 ]; then
                echo "Попытка $RETRY_COUNT/$MAX_RETRIES..."
              fi
            done

            if [ "$APP_STARTED" = false ]; then
              echo "⚠️  Не удалось подтвердить запуск через health check"
              echo "📋 Последние строки лога:"
              tail -n 30 logs/app.log 2>/dev/null || echo "Лог недоступен"
              
              echo ""
              echo "🔍 Проверка состояния:"
              echo "Screen сессии:"
              screen -list || true
              echo ""
              echo "Процессы Node.js:"
              ps aux | grep -E "node|npm" | grep -v grep || echo "Процессы не найдены"
              echo ""
              echo "Порты:"
              netstat -tuln | grep LISTEN || ss -tuln | grep LISTEN || echo "netstat/ss недоступны"
              
              # Не считаем это критической ошибкой если screen сессия активна
              if screen -list | grep -q "$SCREEN_NAME"; then
                echo ""
                echo "⚠️  Health check не прошел, но screen сессия активна"
                echo "✓ Деплой может быть успешным, проверьте приложение вручную"
                # Не выходим с ошибкой
              else
                echo ""
                echo "❌ Приложение не запустилось"
                exit 1
              fi
            else
              echo "✅ Приложение успешно запущено и готово к работе"
            fi

            # Очистка бэкапов при успешном деплое
            echo "🧹 Очистка временных файлов..."
            rm -rf .next.backup node_modules.backup 2>/dev/null || true

            # Отключаем trap после успешного деплоя
            trap - ERR

            echo ""
            echo "======================================"
            echo "✅ Деплой завершён успешно!"
            echo "📍 Коммит: $NEW_COMMIT"
            echo "🖥️  Screen сессия: $SCREEN_NAME"
            echo "📊 Логи: $PROJECT_DIR/logs/app.log"
            echo "🔧 Node.js: $(node -v)"
            echo "======================================"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Деплой выполнен успешно на $(date)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Деплой провален на $(date)"
